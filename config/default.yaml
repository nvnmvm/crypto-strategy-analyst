config_version: 2
profile: auto
strategy:
  support_rebound: true
  breakout_retest: true
  trend_pullback: true
  range_reversal: true
  bear_reversal: false
  bear_accumulation: false
  minimum_confidence: 58
  entry_confidence: 68
  minimum_reward_risk: 2
  touch_cooldown_bars: 6
  level_tolerance_atr: 0.35
risk:
  account_equity: 600
  risk_per_trade: 0.01
  maximum_position_fraction: 0.30
  maximum_order_notional: 200
  maximum_daily_loss: 0.03
  maximum_drawdown: 0.15
trading:
  trading_enabled: false
  futures_enabled: false
  require_human_confirmation: true
  testnet: true
  symbol_whitelist: [BTCUSDT, ETHUSDT]
  api_key_env: BINANCE_API_KEY
  api_secret_env: BINANCE_API_SECRET
  maximum_price_deviation: 0.01
  confirmation_ttl_seconds: 120
  request_timeout_seconds: 10
  emergency_stop: false
data:
  exchange: binance
  timeframes: [1w, 1d, 4h, 1h]
  history_limit: 500
  stale_after_seconds: 600
storage:
  state_dir: state
  output_dir: outputs
  paper_account_file: state/paper-account.json
  paper_trades_file: state/paper-trades.jsonl
  journal_file: state/manual-journal.jsonl
