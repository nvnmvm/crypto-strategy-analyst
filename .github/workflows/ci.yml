name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest --cov=crypto_strategy_analyst --cov-report=term-missing --cov-fail-under=75
      - run: python -m pip check
      - run: python -m build
      - name: Verify wheel install and OpenClaw assets
        shell: bash
        run: |
          wheel="$(find dist -name '*.whl' -print -quit)"
          python -m zipfile -l "$wheel" | tee wheel-contents.txt
          grep -q 'SKILL.md' wheel-contents.txt
          grep -q 'references/strategy-rules.md' wheel-contents.txt
          grep -q 'schemas/analysis-report.schema.json' wheel-contents.txt
          grep -q 'config/default.yaml' wheel-contents.txt
          python -m venv /tmp/crypto-strategy-wheel
          /tmp/crypto-strategy-wheel/bin/python -m pip install "$wheel"
          /tmp/crypto-strategy-wheel/bin/crypto-strategy-analyst --help
          /tmp/crypto-strategy-wheel/bin/crypto-strategy-analyst risk --help
